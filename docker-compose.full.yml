services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codespar
      POSTGRES_USER: codespar
      POSTGRES_PASSWORD: codespar_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codespar"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  core:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://codespar:codespar_dev@postgres:5432/codespar
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3000
      ENABLE_WHATSAPP: "true"
      WHATSAPP_BOT_NAME: "@codespar"
      ENABLE_SLACK: "true"
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - whatsapp_auth:/app/auth_info

volumes:
  postgres_data:
  redis_data:
  whatsapp_auth:
